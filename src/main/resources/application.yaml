spring:
  application:
    name: czyzlowie
  config:
    import: optional:classpath:application-secrets.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/czyzlowie
    username: user
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        format_sql: true
        highlight_sql: true
        generate_statistics: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  mail:
    host: ssl0.ovh.net
    port: 587
    username: "kontakt@czyzlowie.pl"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true
  security:
    oauth2:
      client:
        registration:
          google:
            provider: google
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          facebook:
            provider: facebook
            scope:
              - email
              - public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          facebook:
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture

app:
  url: http://localhost:8080
  mail:
    from: "kontakt@czyzlowie.pl"
  security:
    remember-me:
      key: "@z$Z^o$i!_)-0j3ct#2026_?:aFz?uzy_n0t_38A*2zsc*d/*<-+=_K3y_458174671!2sf5@a"

logging:
  level:
    pl.czyzlowie: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    liquibase: INFO

  docker:
    compose:
      lifecycle-management: start_and_stop
      startup:
        readiness:
          tcp:
            timeout: 10s
management:
  health:
    mail:
      enabled: false


imgw:
  api:
    meteo-url: https://danepubliczne.imgw.pl/api/data/meteo
    synop-url: https://danepubliczne.imgw.pl/api/data/synop
    hydro-url: https://danepubliczne.imgw.pl/api/data/hydro
  # Co 30 minut, równo z zegarem
  scheduler:
    meteo:
      cron: 0 0,30 * * * *
    hydro:
      cron: 0 0,30 * * * *
    synop:
      cron: 0 5,20,35,50 * * * *

forecast:
  api:
    url: "https://api.open-meteo.com/v1/forecast"

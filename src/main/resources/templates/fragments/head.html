<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="head-content">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${pageDescription != null ? pageDescription : 'Prognoza brań i kalendarz brań ryb online. Najdokładniejszy kalkulator brań w Polsce. Dowiedz się kiedy łowić szczupaka, sandacza i białoryba. Analiza IMGW, meteo i hydro.'}">
    <meta name="keywords" content="prognoza brań, kalendarz brań, kiedy łowić, kalkulator brań, kalkulator wędkarski, barometr wędkarski, fazy księżyca ryby, kiedy na ryby">
    <meta name="robots" content="index, follow">
    <meta name="language" content="pl">
    <meta name="geo.region" content="PL">
    <meta name="geo.placename" content="Poland">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CzyZlowie">
    <meta name="format-detection" content="telephone=no">
    <meta name="referrer" content="no-referrer-when-downgrade">

    <meta property="og:type" content="website">
    <meta property="og:url" th:content="${currentUrl != null ? currentUrl : '/'}">
    <meta property="og:title" th:content="${pageTitle != null ? pageTitle : 'CzyZlowie | Kalkulator Brań'}">
    <meta property="og:description" th:content="${pageDescription != null ? pageDescription : 'Planujesz wyprawę na ryby? Sprawdź aktualną prognozę brań i warunki meteo!'}">
    <meta property="og:image" th:content="@{/assets/og-preview.jpg}">

    <!-- Twitter / X Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" th:content="${currentUrl != null ? currentUrl : '/'}">
    <meta property="twitter:title" th:content="${pageTitle != null ? pageTitle : 'CzyZlowie | Prognoza Brań'}">
    <meta property="twitter:description" th:content="${pageDescription != null ? pageDescription : 'Najdokładniejszy kalkulator brań ryb. Dowiedz się kiedy łowić szczupaka, sandacza i białoryba.'}">
    <meta property="twitter:image" th:content="@{/assets/og-preview.jpg}">
    <meta property="twitter:creator" content="@CzyZlowie">

    <title th:text="${pageTitle != null ? pageTitle + ' | CzyZlowie.pl' : 'CzyZlowie.pl | Kalkulator Brań'}">CzyZlowie.pl</title>

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">

    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="canonical" th:href="${currentUrl != null ? currentUrl : '/'}">

    <link rel="icon" type="image/png" th:href="@{/assets/favicon-32x32.png}">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.1/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/coffe.css}">

    <!-- JS --->
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script th:src="@{/js/auth-session.js}" defer></script>

    <!-- Google Analytics  -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y3PMV7LB0W"></script>

        gtag('js', new Date());
        gtag('config', 'G-Y3PMV7LB0W');

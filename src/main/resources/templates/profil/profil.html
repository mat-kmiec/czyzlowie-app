<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <th:block th:replace="~{fragments/head :: head-content(
        pageTitle='Mój Profil',
        pageDescription='Zarządzaj swoim kontem na CzyZlowie.pl. Zmieniaj dane, hasło i śledź swoje wędkarskie statystyki.',
        currentUrl='https://czyzlowie.pl/profil'
    )}"></th:block>

    <link rel="stylesheet" th:href="@{/css/profil/panel.css}">
    <link rel="stylesheet" th:href="@{/css/profil/profil.css}">

</head>
<body class="algo-page">

<nav th:replace="~{fragments/navbar :: navbar(activeTab='profil')}"></nav>

<div class="algo-bg-container" aria-hidden="true">
    <picture>
        <img src="/assets/drapiezniki.jpg" alt="Tło profilu" class="algo-bg-image" loading="lazy">
    </picture>
    <div class="algo-bg-overlay"></div>
    <div class="algo-glow glow-top-left"></div>
    <div class="algo-glow glow-bottom-right"></div>
</div>

<main class="container-xl position-relative z-2 pb-5" style="margin-top: 90px;">

    <header class="algo-glass-panel p-3 p-md-4 mb-4 h-auto" style="flex-direction: row; justify-content: space-between; align-items: center;">
        <div>
            <div class="d-flex align-items-center gap-3 mb-1">
                <div class="icon-wrapper" style="background: rgba(14, 165, 233, 0.1); border: 1px solid var(--brand-blue); padding: 10px; border-radius: 10px;">
                    <i data-lucide="user" style="color: var(--brand-blue); width: 28px; height: 28px;"></i>
                </div>
                <h1 class="display-6 fw-black text-white mb-0" style="text-shadow: 0 0 15px var(--brand-blue-glow);">Twój Profil</h1>
            </div>
            <p class="fs-6 mb-0 ps-1 text-secondary-custom">
                Zarządzaj swoją tożsamością, zabezpieczeniami i śledź wędkarskie osiągnięcia.
            </p>
        </div>
    </header>

    <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div class="row g-4">
        <aside class="col-xl-4 d-flex flex-column gap-4">
            <div class="algo-glass-panel p-4 h-auto position-sticky" style="top: 100px;">

                <div class="text-center">
                    <div class="user-avatar-hex">
                        <i data-lucide="anchor" style="width: 45px; height: 45px; color: var(--brand-blue);"></i>
                    </div>
                    <h2 class="fs-4 fw-black text-white mb-2" th:text="${user.username}">Jan Kowalski</h2>
                    <div class="badge text-uppercase ls-1 fw-bold" style="background: rgba(46, 204, 113, 0.15); color: var(--brand-green); border: 1px solid rgba(46, 204, 113, 0.3); padding: 8px 15px; border-radius: 8px;">
                        <i data-lucide="award" style="width: 14px; margin-right: 4px; margin-bottom: 2px;"></i> Aktywny Łowca
                    </div>
                </div>

                <hr style="border-color: var(--glass-border); margin: 1.5rem 0;">

                <h3 class="fs-8 text-uppercase fw-bold text-secondary-custom mb-0 text-center" style="letter-spacing: 1px;">Twoje Wyniki</h3>

                <div class="stat-grid">
                    <div class="algo-stat-card">
                        <i data-lucide="radar" style="color: var(--brand-blue); margin-bottom: 8px;"></i>
                        <span class="stat-val">156</span>
                        <span class="stat-lbl">Prognozy</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="fish" style="color: var(--brand-green); margin-bottom: 8px;"></i>
                        <span class="stat-val">42</span>
                        <span class="stat-lbl">Złowione</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="map" style="color: var(--ignore-orange); margin-bottom: 8px;"></i>
                        <span class="stat-val">14</span>
                        <span class="stat-lbl">Wyprawy</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="map-pin" style="color: #a855f7; margin-bottom: 8px;"></i>
                        <span class="stat-val">8</span>
                        <span class="stat-lbl">Miejscówki</span>
                    </div>
                </div>

            </div>
        </aside>

        <div class="col-xl-8 d-flex flex-column gap-4">

            <section class="algo-glass-panel p-4 h-auto border-top-blue">
                <h2 class="section-header header-line-blue m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="fingerprint" style="color: var(--brand-blue);"></i> Publiczna Tożsamość</div>
                </h2>

                <form th:action="@{/profil/username}" method="post">
                    <div class="row align-items-end g-3">
                        <div class="col-md-8">
                            <label class="input-label">Twoja ksywka wędkarska</label>
                            <div class="algo-input-group">
                                <input type="text" name="username" class="algo-input input-focus-blue"
                                       th:value="${user.username}" placeholder="Wpisz nowy nick..." required minlength="3" maxlength="50">
                                <i data-lucide="at-sign" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-4 mobile-stack-btn">
                            <button type="submit" class="btn-algo btn-blue">
                                Zapisz Zmiany
                            </button>
                        </div>
                    </div>
                </form>

            </section>

            <section class="algo-glass-panel p-4 h-auto border-top-green">
                <h2 class="section-header header-line-green m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="mail" style="color: var(--brand-green);"></i> Dane Kontaktowe i Logowanie</div>
                </h2>

                <form th:action="@{/profil/email}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="input-label">Aktualny E-mail</label>
                            <div class="algo-input-group">
                                <input type="email" class="algo-input" th:value="${user.email}" readonly>
                                <i data-lucide="lock" class="input-icon" style="opacity: 0.5;"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Nowy E-mail</label>
                            <div class="algo-input-group">
                                <input type="email" name="newEmail" class="algo-input input-focus-green" placeholder="Wpisz nowy e-mail..." required>
                                <i data-lucide="mail-plus" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-12 mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn-algo btn-green btn-limit-width">
                                Aktualizuj E-mail
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="algo-glass-panel p-4 h-auto border-top-red">
                <h2 class="section-header header-line-red m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="shield-alert" style="color: var(--predator-red);"></i> Bezpieczeństwo</div>
                </h2>

                <form th:action="@{/profil/password}" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="input-label">Aktualne Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="oldPassword" class="algo-input input-focus-red" placeholder="Podaj obecne hasło..." required>
                                <i data-lucide="key" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Nowe Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="newPassword" class="algo-input input-focus-red" placeholder="Podaj nowe hasło..." required>
                                <i data-lucide="lock-keyhole" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Powtórz Nowe Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="confirmPassword" class="algo-input input-focus-red" placeholder="Potwierdź nowe hasło..." required>
                                <i data-lucide="check-circle" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-12 mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn-algo btn-red btn-limit-width">
                                <i data-lucide="shield-check" style="width: 18px;"></i> Zmień Hasło
                            </button>
                        </div>
                    </div>
                </form>
            </section>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>

</body>
</html>

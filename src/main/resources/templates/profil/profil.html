<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <th:block th:replace="~{fragments/head :: head-content(
        pageTitle='Mój Profil | CzyZlowie',
        pageDescription='Zarządzaj swoim kontem na CzyZlowie.pl. Zmieniaj dane, hasło i śledź swoje wędkarskie statystyki.',
        currentUrl='https://czyzlowie.pl/profil'
    )}"></th:block>

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        /* === ZMIENNE BAZOWE === */
        :root {
            --brand-green: #2ecc71;
            --brand-green-glow: rgba(46, 204, 113, 0.25);
            --predator-red: #ef4444;
            --predator-red-glow: rgba(239, 68, 68, 0.25);
            --brand-blue: #0ea5e9;
            --brand-blue-glow: rgba(14, 165, 233, 0.25);
            --ignore-orange: #f59e0b;
            --bg-dark-base: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        /* === BAZA STRONY === */
        body.algo-page {
            background-color: var(--bg-dark-base);
            min-height: 100vh;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        .algo-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; overflow: hidden;
        }

        .algo-bg-image {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.25; filter: blur(5px);
        }

        .algo-bg-overlay {
            position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15,23,42,0.85) 0%, rgba(15,23,42,0.98) 100%);
        }

        .algo-glow {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; pointer-events: none;
        }
        .glow-top-left { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(14, 165, 233, 0.2); }
        .glow-bottom-right { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: rgba(46, 204, 113, 0.1); }

        /* === PANELS & HEADERS === */
        .algo-glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column;
        }
        .algo-glass-panel:hover { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7); }

        /* Akcenty kafelków (paski na górze) */
        .border-top-blue { border-top: 2px solid var(--brand-blue); }
        .border-top-green { border-top: 2px solid var(--brand-green); }
        .border-top-red { border-top: 2px solid var(--predator-red); }

        .section-header {
            font-size: 0.95rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
            color: #fff; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;
            padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);
        }

        /* Dopasowanie koloru linii pod nagłówkiem do sekcji */
        .header-line-blue { border-bottom-color: rgba(14, 165, 233, 0.2); }
        .header-line-green { border-bottom-color: rgba(46, 204, 113, 0.2); }
        .header-line-red { border-bottom-color: rgba(239, 68, 68, 0.2); }

        /* === FORMULARZE I INPUTY === */
        .algo-input-group {
            position: relative; display: flex; align-items: center; width: 100%;
        }

        .algo-input {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border); color: #fff;
            border-radius: 10px; padding: 0.9rem 1rem 0.9rem 2.8rem; font-size: 1rem; width: 100%; transition: all 0.3s;
        }

        .algo-input::placeholder { color: var(--text-muted); opacity: 0.7; font-size: 0.9rem; }

        .algo-input:focus {
            outline: none; background: rgba(0, 0, 0, 0.7);
        }

        /* Focus kolory bazujące na sekcjach */
        .input-focus-blue:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px var(--brand-blue-glow); }
        .input-focus-green:focus { border-color: var(--brand-green); box-shadow: 0 0 0 3px var(--brand-green-glow); }
        .input-focus-red:focus { border-color: var(--predator-red); box-shadow: 0 0 0 3px var(--predator-red-glow); }

        .input-icon {
            position: absolute; left: 1rem; color: #64748b; pointer-events: none; transition: 0.3s; width: 18px;
        }

        .algo-input:focus ~ .input-icon { color: #fff; }

        .algo-input[readonly] {
            background: rgba(255, 255, 255, 0.02); color: var(--text-secondary); border-color: transparent; box-shadow: none; cursor: not-allowed;
        }

        .input-label {
            display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: 800;
            letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem; margin-left: 0.25rem;
        }

        /* === PRZYCISKI === */
        .btn-algo {
            background-size: 200% auto; color: #fff; font-weight: 800; font-size: 0.95rem;
            letter-spacing: 1px; text-transform: uppercase; border-radius: 10px; padding: 1rem; width: 100%;
            transition: all 0.3s ease; position: relative; overflow: hidden; cursor: pointer; border: none;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none;
        }
        .btn-algo:hover { transform: translateY(-2px); background-position: right center; color: #fff; }

        .btn-blue { background-image: linear-gradient(90deg, #0284c7, #0ea5e9, #0284c7); box-shadow: 0 0 15px var(--brand-blue-glow); border: 1px solid rgba(14, 165, 233, 0.4); }
        .btn-green { background-image: linear-gradient(90deg, #059669, #10b981, #059669); box-shadow: 0 0 15px var(--brand-green-glow); border: 1px solid rgba(46, 204, 113, 0.4); }
        .btn-red { background-image: linear-gradient(90deg, #b91c1c, #ef4444, #b91c1c); box-shadow: 0 0 15px var(--predator-red-glow); border: 1px solid rgba(239, 68, 68, 0.4); }

        /* Ograniczenie szerokości na desktopach */
        .btn-limit-width { max-width: 250px; }

        /* === AVATAR I STATYSTYKI === */
        .user-avatar-hex {
            width: 100px; height: 100px; margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--bg-dark-base) 0%, rgba(14, 165, 233, 0.2) 100%);
            border: 2px solid var(--brand-blue);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--brand-blue-glow);
        }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 1.5rem; }

        .algo-stat-card {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px; display: flex; flex-direction: column;
            align-items: center; text-align: center; transition: 0.3s;
        }
        .algo-stat-card:hover {
            background: rgba(255, 255, 255, 0.05); transform: translateY(-3px); border-color: rgba(255, 255, 255, 0.15);
        }

        .stat-val { font-size: 1.5rem; font-weight: 900; line-height: 1.1; color: #fff; margin-bottom: 2px; }
        .stat-lbl { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; color: var(--text-secondary); }

        /* === RESPONSYWNOŚĆ === */
        @media (max-width: 767.98px) {
            .btn-algo {
                width: 100% !important;
                max-width: 100% !important; /* Wymuszenie 100% na telefonach */
                margin-top: 0.5rem;
            }
            .btn-limit-width {
                max-width: 100%; /* Reset ogranicznika dla mobilki */
            }
            /* Poprawa odstepow miedzy inputem a guzikiem na tel */
            .mobile-stack-btn {
                margin-top: 1rem;
                display: flex;
            }
        }
    </style>
</head>
<body class="algo-page">

<nav th:replace="~{fragments/navbar :: navbar(activeTab='profil')}"></nav>

<div class="algo-bg-container" aria-hidden="true">
    <picture>
        <img src="/assets/drapiezniki.jpg" alt="Tło profilu" class="algo-bg-image" loading="lazy">
    </picture>
    <div class="algo-bg-overlay"></div>
    <div class="algo-glow glow-top-left"></div>
    <div class="algo-glow glow-bottom-right"></div>
</div>

<main class="container-xl position-relative z-2 pb-5" style="margin-top: 90px;">

    <header class="algo-glass-panel p-3 p-md-4 mb-4 h-auto" style="flex-direction: row; justify-content: space-between; align-items: center;">
        <div>
            <div class="d-flex align-items-center gap-3 mb-1">
                <div class="icon-wrapper" style="background: rgba(14, 165, 233, 0.1); border: 1px solid var(--brand-blue); padding: 10px; border-radius: 10px;">
                    <i data-lucide="user" style="color: var(--brand-blue); width: 28px; height: 28px;"></i>
                </div>
                <h1 class="display-6 fw-black text-white mb-0" style="text-shadow: 0 0 15px var(--brand-blue-glow);">Twój Profil</h1>
            </div>
            <p class="fs-6 mb-0 ps-1 text-secondary-custom">
                Zarządzaj swoją tożsamością, zabezpieczeniami i śledź wędkarskie osiągnięcia.
            </p>
        </div>
    </header>

    <div class="row g-4">
        <aside class="col-xl-4 d-flex flex-column gap-4">
            <div class="algo-glass-panel p-4 h-auto position-sticky" style="top: 100px;">

                <div class="text-center">
                    <div class="user-avatar-hex">
                        <i data-lucide="anchor" style="width: 45px; height: 45px; color: var(--brand-blue);"></i>
                    </div>
                    <h2 class="fs-4 fw-black text-white mb-2">Jan Kowalski</h2>
                    <div class="badge text-uppercase ls-1 fw-bold" style="background: rgba(46, 204, 113, 0.15); color: var(--brand-green); border: 1px solid rgba(46, 204, 113, 0.3); padding: 8px 15px; border-radius: 8px;">
                        <i data-lucide="award" style="width: 14px; margin-right: 4px; margin-bottom: 2px;"></i> Aktywny Łowca
                    </div>
                </div>

                <hr style="border-color: var(--glass-border); margin: 1.5rem 0;">

                <h3 class="fs-8 text-uppercase fw-bold text-secondary-custom mb-0 text-center" style="letter-spacing: 1px;">Twoje Wyniki</h3>

                <div class="stat-grid">
                    <div class="algo-stat-card">
                        <i data-lucide="radar" style="color: var(--brand-blue); margin-bottom: 8px;"></i>
                        <span class="stat-val">156</span>
                        <span class="stat-lbl">Prognozy</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="fish" style="color: var(--brand-green); margin-bottom: 8px;"></i>
                        <span class="stat-val">42</span>
                        <span class="stat-lbl">Złowione</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="map" style="color: var(--ignore-orange); margin-bottom: 8px;"></i>
                        <span class="stat-val">14</span>
                        <span class="stat-lbl">Wyprawy</span>
                    </div>
                    <div class="algo-stat-card">
                        <i data-lucide="map-pin" style="color: #a855f7; margin-bottom: 8px;"></i>
                        <span class="stat-val">8</span>
                        <span class="stat-lbl">Miejscówki</span>
                    </div>
                </div>

            </div>
        </aside>

        <div class="col-xl-8 d-flex flex-column gap-4">

            <section class="algo-glass-panel p-4 h-auto border-top-blue">
                <h2 class="section-header header-line-blue m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="fingerprint" style="color: var(--brand-blue);"></i> Publiczna Tożsamość</div>
                </h2>

                <form action="#" method="post">
                    <div class="row align-items-end g-3">
                        <div class="col-md-8">
                            <label class="input-label">Twoja ksywka wędkarska</label>
                            <div class="algo-input-group">
                                <input type="text" name="username" class="algo-input input-focus-blue" value="Jan Kowalski" placeholder="Wpisz nowy nick..." required>
                                <i data-lucide="at-sign" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-4 mobile-stack-btn">
                            <button type="submit" class="btn-algo btn-blue">
                                Zapisz Zmiany
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="algo-glass-panel p-4 h-auto border-top-green">
                <h2 class="section-header header-line-green m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="mail" style="color: var(--brand-green);"></i> Dane Kontaktowe i Logowanie</div>
                </h2>

                <form action="#" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="input-label">Aktualny E-mail</label>
                            <div class="algo-input-group">
                                <input type="email" class="algo-input" value="jan.kowalski@email.com" readonly>
                                <i data-lucide="lock" class="input-icon" style="opacity: 0.5;"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Nowy E-mail</label>
                            <div class="algo-input-group">
                                <input type="email" name="newEmail" class="algo-input input-focus-green" placeholder="Wpisz nowy e-mail..." required>
                                <i data-lucide="mail-plus" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-12 mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn-algo btn-green btn-limit-width">
                                Aktualizuj E-mail
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="algo-glass-panel p-4 h-auto border-top-red">
                <h2 class="section-header header-line-red m-0 mb-4">
                    <div class="d-flex align-items-center gap-2"><i data-lucide="shield-alert" style="color: var(--predator-red);"></i> Bezpieczeństwo</div>
                </h2>

                <form action="#" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="input-label">Aktualne Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="oldPassword" class="algo-input input-focus-red" placeholder="Podaj obecne hasło..." required>
                                <i data-lucide="key" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Nowe Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="newPassword" class="algo-input input-focus-red" placeholder="Podaj nowe hasło..." required>
                                <i data-lucide="lock-keyhole" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="input-label">Powtórz Nowe Hasło</label>
                            <div class="algo-input-group">
                                <input type="password" name="confirmPassword" class="algo-input input-focus-red" placeholder="Potwierdź nowe hasło..." required>
                                <i data-lucide="check-circle" class="input-icon"></i>
                            </div>
                        </div>
                        <div class="col-12 mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn-algo btn-red btn-limit-width">
                                <i data-lucide="shield-check" style="width: 18px;"></i> Zmień Hasło
                            </button>
                        </div>
                    </div>
                </form>
            </section>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>

</body>
</html>

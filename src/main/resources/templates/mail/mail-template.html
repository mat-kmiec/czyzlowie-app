<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wiadomość od CzyZlowie.pl</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f5f7;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f5f7; padding: 20px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

                <tr>
                    <td align="center" style="background-color: #1e293b; padding: 20px;">
                        <img src="cid:logoResource" alt="CzyZlowie Logo" style="max-height: 50px; display: block;">
                    </td>
                </tr>

                <tr>
                    <td style="padding: 30px; color: #334155; font-size: 16px; line-height: 1.6;">
                        <div th:utext="${messageContent}">
                        </div>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="background-color: #1e293b; padding: 15px; color: #94a3b8; font-size: 12px; line-height: 1.5;">
                        Wędkuj z głową! © 2026 CzyZlowie.pl<br>
                        Wiadomość wygenerowana automatycznie, prosimy na nią nie odpowiadać.
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
